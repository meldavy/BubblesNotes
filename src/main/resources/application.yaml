ktor:
  application:
    modules:
      - com.mel.bubblenotes.ApplicationKt.module
  deployment:
    port: ${PORT:8080}

# Database configuration (defaults to H2 in-memory for local development)
# Override via environment variables: DB_URL, DB_USER, DB_PASSWORD
db:
  url: ${DB_URL:jdbc:h2:mem:bubblesnotes;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
  user: ${DB_USER:sa}
  password: ${DB_PASSWORD:}
  pool-size: ${DB_POOL_SIZE:10}
  min-idle: ${DB_MIN_IDLE:2}

# Encryption settings (defaults for development, MUST be set in production)
encryption:
  key: ${ENCRYPTION_KEY:dev-encryption-key-do-not-use-in-production!!}
  session-key: ${SESSION_ENCRYPTION_KEY:dev-session-key-48bytes-for-aes-gcm-!!!!!!!!!!!!}

# Google OAuth configuration
oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/auth/google/callback}
    scopes: email,profile

# OpenAI AI enhancement configuration
ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    api-url: ${OPENAI_API_URL:}
    model-id: ${OPENAI_MODEL_ID:}
    summary-threshold: ${AI_SUMMARY_THRESHOLD:500}
    request-timeout: ${AI_REQUEST_TIMEOUT:300000}


# CORS allowed origin (full URL). Must be set for production deployments.
# Example: https://notes.example.com
# Default points to localhost for development.
origin: ${ORIGIN:http://127.0.0.1:8080}
